name: remotepc-host
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - packages/remotepc-host/**
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository }}
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04       # x86_64-linux -> remotepc-host.deb (amd64)
          - ubuntu-24.04-arm   # aarch64-linux -> remotepc-host-pi64.deb (arm64)
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}
    env:
      CELLAR_SERVER: ${{ secrets.CELLAR_SERVER }}
      CELLAR_TOKEN: ${{ secrets.CELLAR_TOKEN }}
      CELLAR_CACHE_ID: ${{ secrets.CELLAR_CACHE_ID }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false

      - name: Install cellarctl
        uses: jinxcappa/cellar-action@v1
        with:
          configure-nix: "true"

      - name: Build and push
        run: cellarctl push --flake .#remotepc-host
