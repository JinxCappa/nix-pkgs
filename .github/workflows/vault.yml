name: vault
on:
  push:
    branches:
      - main
    paths:
      - packages/vault/**
      - .github/workflows/vault.yml
  pull_request:
    branches:
      - main
    paths:
      - packages/vault/**
      - .github/workflows/vault.yml
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-15
          - macos-15-intel
    runs-on: ${{ matrix.runner }}
    name: vault (${{ matrix.runner }})
    steps:
      - uses: actions/checkout@v4

      - name: Install current Bash on macOS
        if: runner.os == 'macOS'
        run: |
          command -v brew && brew install bash || true

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21
        with:
          determinate: false

      - name: Install Attic client
        run: |
          nix profile install "nixpkgs#attic-client"
          echo "$HOME/.nix-profile/bin" >> "$GITHUB_PATH"

      - name: Configure Attic
        continue-on-error: true
        run: |
          export PATH=$HOME/.nix-profile/bin:$PATH
          attic login --set-default ci "$ATTIC_SERVER" "$ATTIC_TOKEN"
          attic use "$ATTIC_CACHE"
          if [ -n "$ATTIC_TOKEN" ]; then
            echo ATTIC_CACHE=$ATTIC_CACHE >>$GITHUB_ENV
          fi
        env:
          ATTIC_SERVER: ${{ secrets.ATTIC_SERVER }}
          ATTIC_CACHE: ${{ secrets.ATTIC_CACHE }}
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}

      - name: Build and push vault
        run: |
          set -euo pipefail
          export PATH=$HOME/.nix-profile/bin:$PATH
          nix build --no-link --print-out-paths -L --fallback .#vault | xargs -I {} attic push "ci:$ATTIC_CACHE" {}
