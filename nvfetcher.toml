# nvfetcher configuration for package sources
# Run `nvfetcher` or `nix run nixpkgs#nvfetcher` to update _sources/generated.nix

[claude-code]
src.cmd = "npm view @anthropic-ai/claude-code version"
fetch.url = "https://registry.npmjs.org/@anthropic-ai/claude-code/-/claude-code-$ver.tgz"

[caddy-l4]
src.github = "mholt/caddy-l4"
src.include_regex = "^v[0-9]+\\.[0-9]+\\.[0-9]+$"
fetch.github = "mholt/caddy-l4"

[deploy-rs]
src.git = "https://github.com/serokell/deploy-rs"
src.branch = "master"
fetch.github = "serokell/deploy-rs"

[netbird]
src.github = "netbirdio/netbird"
src.include_regex = "^v[0-9]+\\.[0-9]+\\.[0-9]+$"
fetch.github = "netbirdio/netbird"
git.fetchSubmodules = true

[rustdesk]
src.github = "rustdesk/rustdesk"
fetch.github = "rustdesk/rustdesk"
git.fetchSubmodules = true

[oh-my-zsh]
src.git = "https://github.com/ohmyzsh/ohmyzsh"
src.branch = "master"
fetch.github = "ohmyzsh/ohmyzsh"

[sops-install-secrets]
src.git = "https://github.com/Mic92/sops-nix"
src.branch = "master"
fetch.github = "Mic92/sops-nix"

[vector]
src.cmd = "git ls-remote --tags https://github.com/vectordotdev/vector.git | sed -n 's|.*refs/tags/\\(v[0-9]*\\.[0-9]*\\.[0-9]*\\)$|\\1|p' | sort -V | tail -1"
fetch.github = "vectordotdev/vector"

[victoriametrics-cluster]
src.cmd = "git ls-remote --tags https://github.com/VictoriaMetrics/VictoriaMetrics.git | sed -n 's|.*refs/tags/\\(v[0-9]*\\.[0-9]*\\.[0-9]*-cluster\\)$|\\1|p' | sort -V | tail -1"
fetch.github = "VictoriaMetrics/VictoriaMetrics"

[zabbix74]
src.cmd = "git ls-remote --tags https://github.com/zabbix/zabbix.git | sed -n 's|.*refs/tags/\\(7\\.4\\.[0-9]*\\)$|\\1|p' | sort -V | tail -1"
fetch.github = "zabbix/zabbix"

[zabbix80pre]
src.cmd = "git ls-remote --tags https://github.com/zabbix/zabbix.git | sed -n -e 's|.*refs/tags/\\(8\\.0\\.0alpha[0-9]*\\)$|\\1|p' -e 's|.*refs/tags/\\(8\\.0\\.0beta[0-9]*\\)$|\\1|p' -e 's|.*refs/tags/\\(8\\.0\\.0rc[0-9]*\\)$|\\1|p' | sort -V | tail -1"
fetch.github = "zabbix/zabbix"

[remotepc-host]
src.cmd = "for y in $(date +%Y) $(($(date +%Y)-1)); do v=$(curl -sf https://www.remotepc.com/downloads/linux_release_notes${y}.xml | sed -n 's/.*<ver>Linux Version \\([^<]*\\)<.*/\\1/p' | head -1); [ -n \"$v\" ] && echo $v && break; done"
fetch.url = "https://static.remotepc.com/downloads/rpc/310320/remotepc-host.deb"

# arm64 (Raspberry Pi 64-bit) build. It versions independently of the amd64
# release-notes feed, so the version comes from the .deb's own control file.
[remotepc-host-pi64]
src.cmd = "bash packages/remotepc-host/update-version-pi64.sh"
fetch.url = "https://static.remotepc.com/downloads/rpc/310320/remotepc-host-pi64.deb"

[openbao]
src.github = "openbao/openbao"
src.include_regex = "^v[0-9]+\\.[0-9]+\\.[0-9]+$"
fetch.github = "openbao/openbao"

[vault]
src.github = "hashicorp/vault"
src.include_regex = "^v[0-9]+\\.[0-9]+\\.[0-9]+$"
fetch.github = "hashicorp/vault"
